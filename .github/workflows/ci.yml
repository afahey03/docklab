name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./cmd/... ./internal/... ./pkg/...

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

    docker-build:
      name: Docker build
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Pull base images with retry
          run: |
            images=(
              golang:1.25-alpine
              hashicorp/terraform:1.9.8
              alpine:3.20
            )

            for image in "${images[@]}"; do
              success=0
              for i in 1 2 3; do
                docker pull "$image" && success=1 && break
                echo "Failed pulling $image, retry $i/3"
                sleep 15
              done
              [ "$success" -eq 1 ] || exit 1
            done

        - name: Build backend image
          run: docker build -t docklab-backend-ci .
