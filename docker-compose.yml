services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docklab-backend
    environment:
      APP_ENV: development
      PORT: "8080"
      DATABASE_URL: host=postgres port=5432 user=postgres dbname=docklab sslmode=disable
      JWT_SECRET: dev-secret-change-me
      JWT_TTL_MINUTES: "60"
      DOCKER_HOST: unix:///var/run/docker.sock
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: docklab-postgres
    environment:
      POSTGRES_DB: docklab
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docklab"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
