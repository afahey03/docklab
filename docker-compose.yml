services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docklab-backend
    environment:
      APP_ENV: development
      PORT: "8080"
      DATABASE_URL: host=postgres port=5432 user=postgres dbname=docklab sslmode=disable
      JWT_SECRET: dev-secret-change-me
      JWT_TTL_MINUTES: "60"
      DOCKER_HOST: unix:///var/run/docker.sock
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      DOKLAB_TERRAFORM_STATE_BUCKET: ${DOKLAB_TERRAFORM_STATE_BUCKET:-}
      DOKLAB_TERRAFORM_STATE_REGION: ${DOKLAB_TERRAFORM_STATE_REGION:-us-east-1}
      DOKLAB_TERRAFORM_STATE_TABLE: ${DOKLAB_TERRAFORM_STATE_TABLE:-}
      DOKLAB_TERRAFORM_STATE_KEY_PREFIX: ${DOKLAB_TERRAFORM_STATE_KEY_PREFIX:-docklab/environments}
      IDLE_STOP_AFTER_MINUTES: ${IDLE_STOP_AFTER_MINUTES:-60}
      IDLE_CLOUD_STOP_AFTER_MINUTES: ${IDLE_CLOUD_STOP_AFTER_MINUTES:-}
      IDLE_CLOUD_TERMINATE_AFTER_MINUTES: ${IDLE_CLOUD_TERMINATE_AFTER_MINUTES:-1440}
      DOKLAB_CLOUD_IDLE_POLICY_ENABLED: ${DOKLAB_CLOUD_IDLE_POLICY_ENABLED:-true}
      DOKLAB_SSH_PRIVATE_KEY_PATH: ${DOKLAB_SSH_PRIVATE_KEY_PATH:-/run/secrets/docklab-ssh-key.pem}
      DOKLAB_SSH_PRIVATE_KEY_B64: ${DOKLAB_SSH_PRIVATE_KEY_B64:-}
      DOKLAB_SSH_USER: ${DOKLAB_SSH_USER:-ec2-user}
      DOKLAB_SSH_PORT: ${DOKLAB_SSH_PORT:-22}
      DOKLAB_SSH_CONNECT_TIMEOUT_SECONDS: ${DOKLAB_SSH_CONNECT_TIMEOUT_SECONDS:-15}
      DOKLAB_REMOTE_BOOTSTRAP_TIMEOUT_SECONDS: ${DOKLAB_REMOTE_BOOTSTRAP_TIMEOUT_SECONDS:-300}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      DOKLAB_RATE_LIMIT_ENABLED: ${DOKLAB_RATE_LIMIT_ENABLED:-true}
      DOKLAB_AUTH_RATE_LIMIT_PER_MINUTE: ${DOKLAB_AUTH_RATE_LIMIT_PER_MINUTE:-20}
      DOKLAB_PROVISION_RATE_LIMIT_PER_MINUTE: ${DOKLAB_PROVISION_RATE_LIMIT_PER_MINUTE:-10}
      DOKLAB_API_RATE_LIMIT_PER_MINUTE: ${DOKLAB_API_RATE_LIMIT_PER_MINUTE:-240}
      DOKLAB_MAX_ENVIRONMENTS_PER_USER: ${DOKLAB_MAX_ENVIRONMENTS_PER_USER:-10}
      DOKLAB_MAX_CONCURRENT_OPERATIONS_PER_USER: ${DOKLAB_MAX_CONCURRENT_OPERATIONS_PER_USER:-3}
      DOKLAB_METRICS_ENABLED: ${DOKLAB_METRICS_ENABLED:-true}
      DOKLAB_ALERT_WEBHOOK_URL: ${DOKLAB_ALERT_WEBHOOK_URL:-}
      DOKLAB_FRONTEND_BASE_URL: ${DOKLAB_FRONTEND_BASE_URL:-http://localhost:5173}
      DOKLAB_GITHUB_CLIENT_ID: ${DOKLAB_GITHUB_CLIENT_ID:-}
      DOKLAB_GITHUB_CLIENT_SECRET: ${DOKLAB_GITHUB_CLIENT_SECRET:-}
      DOKLAB_GITHUB_REDIRECT_URL: ${DOKLAB_GITHUB_REDIRECT_URL:-}
      DOKLAB_PRICING_API_ENABLED: ${DOKLAB_PRICING_API_ENABLED:-true}
      DOKLAB_RUNTIME: ${DOKLAB_RUNTIME:-docker}
      DOKLAB_K8S_NAMESPACE: ${DOKLAB_K8S_NAMESPACE:-docklab}
      DOKLAB_K8S_CONTEXT: ${DOKLAB_K8S_CONTEXT:-}
      DOKLAB_IDE_ENABLED: ${DOKLAB_IDE_ENABLED:-true}
      DOKLAB_IDE_IMAGE: ${DOKLAB_IDE_IMAGE:-codercom/code-server:latest}
      DOKLAB_IDE_REMOTE_PORT: ${DOKLAB_IDE_REMOTE_PORT:-8443}
      DOKLAB_SECRETS_MANAGER_SECRET_ID: ${DOKLAB_SECRETS_MANAGER_SECRET_ID:-}
      DOKLAB_SECRETS_MANAGER_REGION: ${DOKLAB_SECRETS_MANAGER_REGION:-}
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ${DOKLAB_SSH_PRIVATE_KEY_HOST_PATH:-./docklab-key.pem}
        target: /run/secrets/docklab-ssh-key.pem
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: docklab-postgres
    environment:
      POSTGRES_DB: docklab
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docklab"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
